<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小学汉字听写通</title>
<meta name="theme-color" content="#F8F3EA">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#F8F3EA;
  --paper2:#EFE7DA;
  --card:#FFFDF8;
  --card2:#F7F1E7;
  --sage:#7D9B7A;
  --sage2:#E8EFE4;
  --blue:#7897A8;
  --blue2:#E8F0F3;
  --clay:#B8816D;
  --clay2:#F4E8E2;
  --sand:#B89A68;
  --sand2:#F3EBD9;
  --ink:#3E3931;
  --muted:#6F675C;
  --soft:#9D9285;
  --line:#DDD1C1;
  --white:#FFFFFF;
  --shadow:0 10px 24px rgba(84,72,56,.10);
  --radius:20px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-text-size-adjust:100%;line-height:1.45}
button,input,select{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
#app{max-width:1440px;margin:0 auto;padding:14px 14px calc(24px + env(safe-area-inset-bottom))}
.header{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--line);padding:14px 14px 12px;margin:0 -14px 14px}
.header-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand-title{font-size:22px;font-weight:800;letter-spacing:.3px;color:var(--ink)}
.brand-sub{font-size:13px;color:var(--muted);margin-top:2px;font-weight:600}
.badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 11px;font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.section-title{font-size:15px;font-weight:850;color:var(--ink);margin-bottom:10px}
.note{font-size:13px;color:var(--muted);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
@media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr)}.brand-title{font-size:20px}}
.tab{min-height:48px;border:1px solid var(--line);border-radius:15px;background:var(--card);font-size:16px;font-weight:800;color:var(--ink);box-shadow:0 4px 10px rgba(84,72,56,.05)}
.tab.sel{background:var(--sage2);border-color:var(--sage);color:#405D3F}
.tab:active,.action:active,.row:active,.small:active{transform:scale(.985)}
.action{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;min-height:64px;border:1px solid var(--line);border-radius:18px;background:var(--card);padding:14px 15px;box-shadow:0 4px 12px rgba(84,72,56,.06);margin-bottom:10px}
.action.primary{background:var(--sage2);border-color:var(--sage)}
.action.blue{background:var(--blue2);border-color:var(--blue)}
.action.clay{background:var(--clay2);border-color:var(--clay)}
.action-title{font-size:17px;font-weight:900;color:var(--ink)}
.action-meta{font-size:13px;color:var(--muted);margin-top:3px;font-weight:700}
.arrow{flex:0 0 auto;color:var(--muted);font-weight:900;font-size:14px}
.lesson-list{display:flex;flex-direction:column;gap:9px}
.row{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:16px;background:var(--card);padding:12px 13px;min-height:62px;box-shadow:0 3px 9px rgba(84,72,56,.04)}
.row-main{flex:1;min-width:0}
.row-title{font-size:16px;font-weight:850;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-meta{font-size:13px;color:var(--muted);font-weight:700;margin-top:3px}
.progress-wrap{width:72px;height:8px;background:var(--paper2);border-radius:20px;overflow:hidden;flex:0 0 auto;border:1px solid rgba(140,126,108,.12)}
.progress-fill{height:100%;width:0;background:var(--sage);border-radius:20px}
.pct{font-size:12px;color:var(--muted);font-weight:850;width:38px;text-align:right;flex:0 0 auto}
.small-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.small{border:1px solid var(--line);border-radius:999px;background:var(--card);padding:9px 12px;font-size:13px;font-weight:800;color:var(--ink)}
.small.danger{color:#835249;background:var(--clay2);border-color:var(--clay)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:520px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}
.stat-n{font-size:24px;font-weight:900;color:var(--ink)}
.stat-l{font-size:12px;color:var(--muted);font-weight:800;margin-top:2px}
.breadcrumb{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:10px}
.practice-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.navbtn{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:10px 12px;font-size:14px;font-weight:850;color:var(--ink)}
.counter{font-size:14px;color:var(--muted);font-weight:900;text-align:center;flex:1}
.bar{height:9px;background:var(--paper2);border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-bottom:14px}
.bar>div{height:100%;background:var(--sage);border-radius:20px;width:0}
.listen-card{text-align:center;padding:20px}
.prompt-title{font-size:15px;color:var(--muted);font-weight:850;margin-bottom:12px}
.listen-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:52px;border-radius:999px;background:var(--blue2);border:1px solid var(--blue);color:#405D69;padding:0 22px;font-size:18px;font-weight:900}
.hidden-char{font-size:52px;line-height:1;color:var(--soft);font-weight:900;margin:12px 0 4px;letter-spacing:4px}
.canvas-card{padding:14px}
.canvas-note{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:10px}
canvas{display:block;margin:0 auto;border-radius:16px;border:1px solid var(--line);background:var(--white);touch-action:none}
.canvas-tools{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}
.tool-text{font-size:13px;color:var(--muted);font-weight:800}
.primary-btn{width:100%;min-height:54px;border-radius:16px;background:var(--sage);color:#FAFFF8;font-size:18px;font-weight:900;box-shadow:0 6px 14px rgba(92,122,87,.18)}
.secondary-btn{width:100%;min-height:52px;border-radius:16px;background:var(--card);border:1px solid var(--line);color:var(--ink);font-size:16px;font-weight:850;margin-top:10px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.box{border:1px solid var(--line);border-radius:18px;background:var(--card);padding:14px;text-align:center;min-height:180px;display:flex;flex-direction:column;justify-content:center}
.box-label{font-size:13px;color:var(--muted);font-weight:850;margin-bottom:8px}
.standard{font-size:96px;line-height:1.05;font-family:"KaiTi","STKaiti","Songti SC",serif;color:var(--ink)}
.judges{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.judge{border-radius:18px;min-height:72px;font-size:18px;font-weight:900;border:1px solid var(--line)}
.judge.ok{background:var(--sage2);border-color:var(--sage);color:#405D3F}
.judge.bad{background:var(--blue2);border-color:var(--blue);color:#405D69}
.finish-title{font-size:28px;font-weight:950;color:var(--ink);margin-bottom:8px;text-align:center}
.finish-sub{font-size:15px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:14px}
.warn{background:var(--sand2);border-color:var(--sand);color:#6D5638}
.footer-note{font-size:12px;color:var(--soft);font-weight:700;text-align:center;margin:14px 0 4px}

.reward-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.coin-pill{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--sand);background:var(--sand2);color:#6D5638;border-radius:999px;padding:9px 13px;font-size:15px;font-weight:950;white-space:nowrap}
.reward-copy{font-size:13px;color:var(--muted);font-weight:750;line-height:1.55;margin-bottom:12px}
.reward-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.reward-actions{grid-template-columns:1fr}}
.reward-btn{min-height:52px;border-radius:16px;border:1px solid var(--line);background:var(--card2);font-size:16px;font-weight:900;color:var(--ink);padding:10px 12px;text-align:center}
.reward-btn.sage{background:var(--sage2);border-color:var(--sage);color:#405D3F}
.reward-btn.blue{background:var(--blue2);border-color:var(--blue);color:#405D69}
.shop-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:1050px){.shop-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:760px){.shop-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){.shop-grid{grid-template-columns:repeat(2,1fr)}}
.sticker-card{border:1px solid var(--line);border-radius:18px;background:var(--card);padding:14px;text-align:center;box-shadow:0 4px 10px rgba(84,72,56,.05)}
.sticker-emoji{font-size:46px;line-height:1;margin-bottom:8px}
.sticker-name{font-size:15px;font-weight:900;color:var(--ink);margin-bottom:5px}
.sticker-meta{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:10px}
.buy-btn{width:100%;min-height:42px;border-radius:14px;background:var(--sage2);border:1px solid var(--sage);color:#405D3F;font-size:14px;font-weight:900}
.buy-btn:disabled{opacity:.55;background:var(--card2);border-color:var(--line);color:var(--soft);cursor:not-allowed}
.album-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
@media(max-width:520px){.album-grid{grid-template-columns:repeat(3,1fr)}}
.album-slot{min-height:84px;border:1px dashed var(--line);border-radius:18px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:42px}
.album-slot.filled{border-style:solid;background:var(--card);box-shadow:0 3px 8px rgba(84,72,56,.05)}
.inventory-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
@media(max-width:520px){.inventory-list{grid-template-columns:1fr}}
.inventory-item{border:1px solid var(--line);border-radius:16px;background:var(--card);padding:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.inventory-main{display:flex;align-items:center;gap:10px;font-weight:900;color:var(--ink)}
.inventory-emoji{font-size:32px;line-height:1}
.place-btn{border:1px solid var(--blue);background:var(--blue2);color:#405D69;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:900;white-space:nowrap}
.empty-state{border:1px dashed var(--line);background:var(--card2);border-radius:18px;padding:18px;text-align:center;color:var(--muted);font-size:14px;font-weight:800;line-height:1.6}


.album-page-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}
.album-page-tab{
  min-height:42px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  font-size:14px;
  font-weight:900;
}
.album-page-tab.sel{
  border-color:var(--blue);
  background:var(--blue2);
  color:#2C5F88;
}
.album-board.page-0{
  background:
    radial-gradient(circle at 18px 18px, rgba(216,178,86,.13) 0 2px, transparent 3px),
    radial-gradient(circle at 54px 54px, rgba(108,167,217,.12) 0 2px, transparent 3px),
    #FFF6E7;
}
.album-board.page-1{
  background:
    radial-gradient(circle at 18px 18px, rgba(116,179,126,.15) 0 2px, transparent 3px),
    radial-gradient(circle at 54px 54px, rgba(226,146,122,.11) 0 2px, transparent 3px),
    #ECF8F0;
}
.album-board.page-2{
  background:
    radial-gradient(circle at 18px 18px, rgba(108,167,217,.14) 0 2px, transparent 3px),
    radial-gradient(circle at 54px 54px, rgba(216,178,86,.10) 0 2px, transparent 3px),
    #EEF6FF;
}
.album-board.ready{
  border-color:var(--sage);
  cursor:crosshair;
}
.album-board.remove-ready{
  border-color:var(--clay);
}
.album-tools{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.album-tool-btn{
  min-height:42px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--card);
  font-size:14px;
  font-weight:900;
}
.album-tool-btn.on{
  border-color:var(--clay);
  background:var(--clay2);
  color:#B05B4A;
}
.remove-hint{
  margin-top:8px;
  padding:9px 11px;
  border-radius:14px;
  background:var(--clay2);
  border:1px solid var(--clay);
  color:#B05B4A;
  font-size:13px;
  font-weight:850;
  line-height:1.45;
}

@media(max-width:900px){.album-board{min-height:860px}}
@media(max-width:520px){.album-board{min-height:720px}}

/* Sticker book redesign */
.stickerbook-shell{max-width:1160px;margin:0 auto;padding:8px 8px 24px;background:#FFFDFC}
.stickerbook-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.stickerbook-back,.stickerbook-shop{border:1px solid #E5DDE9;background:#FFFFFF;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:900;color:#685C77;box-shadow:0 4px 12px rgba(122,101,145,.08)}
.stickerbook-coin{display:inline-flex;align-items:center;gap:8px;background:#FFD966;color:#7A5D00;border:1px solid #F4C72A;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:950;box-shadow:0 6px 14px rgba(244,199,42,.25)}
.stickerbook-header{text-align:center;margin:6px 0 14px}
.stickerbook-title{font-size:44px;line-height:1.05;font-weight:1000;letter-spacing:.5px;color:#8A55C9;text-shadow:3px 3px 0 rgba(153,216,255,.95),0 0 18px rgba(204,176,255,.30)}
.stickerbook-subtitle{margin-top:8px;font-size:16px;color:#6F6B7D;font-weight:800}
.stickerbook-pager{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stickerbook-pagepill{border:1px solid #DED7EB;background:#FFFFFF;color:#66607A;border-radius:999px;padding:10px 16px;font-size:14px;font-weight:900;box-shadow:0 4px 10px rgba(122,101,145,.06)}
.stickerbook-pagepill.sel{background:#F0EAFF;border-color:#BCA9F4;color:#6A49C8}
.stickerbook-frame{max-width:1080px;margin:0 auto 14px}
.album-board{position:relative;min-height:1050px;border:3px solid #D9C9FF;border-radius:28px;overflow:hidden;box-shadow:0 16px 34px rgba(126,98,170,.14), inset 0 0 0 1px rgba(255,255,255,.55)}
.album-board.page-0{background:linear-gradient(180deg,#EEF3FF 0%,#E5ECFF 100%)}
.album-board.page-1{background:linear-gradient(180deg,#ECFAF0 0%,#DFF3E6 100%)}
.album-board.page-2{background:linear-gradient(180deg,#FFF7D9 0%,#FFEFC0 100%)}
.album-board::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.65) 1.1px, transparent 1.1px);background-size:22px 22px;opacity:.45;pointer-events:none}
.album-board.ready{border-color:#99B6FF;box-shadow:0 16px 34px rgba(126,98,170,.16),0 0 0 5px rgba(170,197,255,.18)}
.album-hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:#7E7490;font-size:17px;font-weight:900;text-align:center;line-height:1.6;padding:0 20px;pointer-events:none;max-width:90%}
.stickerbook-help{text-align:center;color:#6D6980;font-size:14px;font-weight:850;margin:10px 0 18px;line-height:1.55}
.sticker-storage{max-width:1080px;margin:0 auto;background:#FFFFFF;border:1px solid #E7E0EF;border-radius:28px;box-shadow:0 10px 24px rgba(122,101,145,.08);padding:18px}
.sticker-storage-title{font-size:26px;font-weight:1000;color:#7D56C7;text-align:center;margin-bottom:6px}
.sticker-storage-note{font-size:14px;color:#6F6B7D;font-weight:800;text-align:center;line-height:1.55;margin-bottom:14px}
.sticker-storage-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:1100px){.sticker-storage-grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:860px){.album-board{min-height:780px}.sticker-storage-grid{grid-template-columns:repeat(4,1fr)}.stickerbook-title{font-size:38px}}
@media(max-width:620px){.album-board{min-height:620px}.sticker-storage-grid{grid-template-columns:repeat(3,1fr)}.stickerbook-topbar{gap:8px}.stickerbook-back,.stickerbook-shop,.stickerbook-coin{padding:9px 12px;font-size:13px}.stickerbook-title{font-size:32px}}
.sticker-storage-item{border:1px solid #E5DDF0;border-radius:18px;background:#FBF9FF;padding:10px 8px;text-align:center;display:flex;flex-direction:column;justify-content:space-between;min-height:118px;box-shadow:0 4px 10px rgba(122,101,145,.05)}
.sticker-storage-item.sel{border-color:#A1B7FF;background:#EEF3FF}
.sticker-storage-emoji{font-size:38px;line-height:1;margin:4px 0 8px}
.sticker-storage-name{font-size:13px;font-weight:900;color:#5A556A;line-height:1.35;min-height:34px}
.sticker-storage-count{font-size:12px;color:#827C91;font-weight:850;margin:6px 0 8px}
.sticker-storage-btn{border:1px solid #B7C8FF;background:#EDF3FF;color:#4667B6;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}
.sticker-storage-btn.sel{background:#7B9EFF;color:#FFF;border-color:#7B9EFF}
.placed-sticker-wrap{position:absolute;transform:translate(-50%,-50%);user-select:none;touch-action:none;cursor:grab;z-index:2}
.placed-sticker-wrap:active{cursor:grabbing}
.placed-sticker-face{font-size:64px;line-height:1;filter:drop-shadow(0 7px 9px rgba(108,94,128,.16));display:block}
.placed-sticker-wrap.active .placed-sticker-face{transform:scale(1.08)}
.sticker-remove-btn{position:absolute;right:-12px;top:-12px;width:28px;height:28px;border-radius:999px;background:#FF5B64;color:#FFF;border:2px solid #FFF;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:1000;box-shadow:0 8px 16px rgba(255,91,100,.35)}
.sticker-remove-btn:hover{background:#F2424C}

</style>
</head>
<body>
<header class="header"><div class="header-inner"><div><div class="brand-title">小学汉字听写通</div><div class="brand-sub">按年级 · 册次 · 课次练习写字表</div></div><div class="badge">2500 字</div></div></header>

function load(){try{const x=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');S.done=x.done||{};S.wrong=x.wrong||{};S.coins=Number.isFinite(x.coins)?x.coins:0;S.stickers=x.stickers||{};S.album=Array.isArray(x.album)?x.album:[];}catch(e){}}
function save(){localStorage.setItem(STORE_KEY,JSON.stringify({done:S.done,wrong:S.wrong,coins:S.coins,stickers:S.stickers,album:S.album}));}

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}
function safe(t){return String(t).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function allLessons(){return DATA.flatMap((g,gi)=>g.vols.flatMap((v,vi)=>v.lessons.map((l,li)=>({g,gi,v,vi,l,li}))));}
function makeItems(gi=null,vi=null,li=null){
  const lessons=allLessons().filter(x=>(gi===null||x.gi===gi)&&(vi===null||x.vi===vi)&&(li===null||x.li===li));
  return lessons.flatMap(x=>x.l.chars.map((c,ci)=>({id:`${x.g.key}|${x.v.label}|${x.l.name}|${ci}|${c}`,c,grade:x.g.label,gradeKey:x.g.key,vol:x.v.label,lesson:x.l.name,lessonNo:x.li+1,charNo:ci+1})));
}
function countDone(items){return items.filter(x=>S.done[x.id]).length;}
function pct(items){return items.length?Math.round(countDone(items)/items.length*100):0;}
function totalCount(){return makeItems(null,null,null).length;}
function lessonCount(){return allLessons().length;}
function startPractice(items,title){if(!items.length){alert('这个范围暂无生字');return;}S.list=items;S.i=0;S.phase='write';S.img=null;S.hasInk=false;S.session={title,ok:0,bad:0,total:items.length,wrongIds:[],earned:0};S.screen='practice';render();setTimeout(()=>speak(S.list[0]),350);}

let audioCtx=null;
function getAudioCtx(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return null;
  if(!audioCtx)audioCtx=new AC();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playTone(ctx,freq,start,dur,type='sine',vol=.08){
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,start);
  gain.gain.setValueAtTime(0.0001,start);
  gain.gain.exponentialRampToValueAtTime(vol,start+0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start+dur+0.02);
}
function playSound(kind){
  try{
    const ctx=getAudioCtx();
    if(!ctx)return;
    const now=ctx.currentTime;
    if(kind==='correct'){
      playTone(ctx,660,now,0.11,'sine',0.07);
      playTone(ctx,880,now+0.10,0.12,'sine',0.075);
      playTone(ctx,1046,now+0.20,0.14,'sine',0.07);
    }else if(kind==='wrong'){
      playTone(ctx,330,now,0.16,'triangle',0.065);
      playTone(ctx,247,now+0.13,0.20,'triangle',0.055);
    }else if(kind==='buy'){
      playTone(ctx,880,now,0.08,'sine',0.07);
      playTone(ctx,1175,now+0.08,0.09,'sine',0.075);
      playTone(ctx,1568,now+0.17,0.12,'sine',0.065);
    }else if(kind==='finish'){
      playTone(ctx,523,now,0.10,'sine',0.07);
      playTone(ctx,659,now+0.10,0.10,'sine',0.07);
      playTone(ctx,784,now+0.20,0.11,'sine',0.075);
      playTone(ctx,1046,now+0.31,0.24,'sine',0.075);
    }
  }catch(e){}
}

function getHintWords(item){
  const words=WORD_HINTS_DRAFT[item.c]||[];
  return words.slice(0,2);
}

function speak(item){
  if(!item||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const words=getHintWords(item).slice(0,2);
  const parts=[item.c,...words].filter(Boolean);
  const u=new SpeechSynthesisUtterance(`${parts.join('，')}。`);
  u.lang='zh-CN';u.rate=.70;u.pitch=1.0;
  const voices=window.speechSynthesis.getVoices().filter(v=>/^zh/.test(v.lang));
  if(voices.length)u.voice=voices[0];
  window.speechSynthesis.speak(u);
}function Home(){
  const wrap=el('div');
  const stats=el('div','stats');
  const learned=Object.keys(S.done).length;
  const wrongN=Object.keys(S.wrong).length;
  [[totalCount(),'总字数'],[lessonCount(),'课次'],[learned,'已练字次'],[wrongN,'生字本']].forEach(([n,l])=>{const s=el('div','stat',`<div class="stat-n">${n}</div><div class="stat-l">${l}</div>`);stats.appendChild(s);});
  const statCard=el('div','card');statCard.appendChild(stats);wrap.appendChild(statCard);
  wrap.appendChild(RewardCard());

  if(wrongN>0){
    const wordbookCard=el('div','card');
    const wrongItems=Object.values(S.wrong);
    wordbookCard.appendChild(action('生字本练习',`${wrongItems.length} 字 · 复练加入生字本的字`,wrongItems,'生字本练习','clay'));
    wrap.appendChild(wordbookCard);
  }

  const gCard=el('div','card');gCard.innerHTML='<div class="section-title">🎓 1. 选择年级</div>';
  const gg=el('div','grid');DATA.forEach((g,gi)=>{const b=el('button','tab'+(S.g===gi?' sel':''),g.label);b.onclick=()=>{S.g=gi;S.v=null;render();};gg.appendChild(b);});gCard.appendChild(gg);wrap.appendChild(gCard);

  if(S.g!==null){
    const g=DATA[S.g];
    const gradeItems=makeItems(S.g,null,null);
    const card=el('div','card');
    card.innerHTML=`<div class="section-title">🧩 2. ${g.label}练习</div><div class="note">先可做全年级综合，也可以继续选择上册或下册。</div>`;

    g.vols.forEach((v,vi)=>{const b=el('button','tab'+(S.v===vi?' sel':''),v.label);b.onclick=()=>{S.v=vi;render();};vt.appendChild(b);});

  return wrap;
}
function action(title,meta,items,practiceTitle,kind='primary'){
  const b=el('button',`action ${kind}`);
  const p=pct(items);
  const icon = kind==='primary' ? '⭐' : (kind==='blue' ? '📘' : '📝');
  b.innerHTML=`<div><div class="action-title">${icon} ${safe(title)}</div><div class="action-meta">${safe(meta)} · 已练 ${p}%</div></div><div class="arrow">开始</div>`;
  b.onclick=()=>startPractice(items,practiceTitle);return b;
}
function lessonRow(g,v,l,li){
  const items=makeItems(S.g,S.v,li);const p=pct(items);
  const r=el('button','row');
  r.innerHTML=`<div class="row-main"><div class="row-title">📖 ${safe(l.name)}</div><div class="row-meta">${l.chars.length} 字 · 点击直接开始这一课</div></div><div class="pct">${p}%</div><div class="progress-wrap"><div class="progress-fill" style="width:${p}%"></div></div><div class="arrow">开始</div>`;
  r.onclick=()=>startPractice(items,`${g.label}${v.label} · ${l.name}`);return r;
}
let ctx=null,strokeCount=0;
function canvasSize(){return Math.min(window.innerWidth-52,330);}
function makeCanvas(){
  const box=el('div');const size=canvasSize();const cv=document.createElement('canvas');cv.width=size;cv.height=size;ctx=cv.getContext('2d');strokeCount=0;S.hasInk=false;
  function grid(){ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,size,size);ctx.strokeStyle='rgba(129,117,99,.28)';ctx.lineWidth=1;ctx.setLineDash([5,6]);ctx.beginPath();ctx.moveTo(size/2,0);ctx.lineTo(size/2,size);ctx.moveTo(0,size/2);ctx.lineTo(size,size/2);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle='rgba(129,117,99,.18)';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(size,size);ctx.moveTo(size,0);ctx.lineTo(0,size);ctx.stroke();}
  grid();
  let down=false,last=[0,0];
  function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;const ratio=size/r.width;return[(t.clientX-r.left)*ratio,(t.clientY-r.top)*ratio];}
  function start(e){e.preventDefault();down=true;last=pos(e);ctx.strokeStyle='#5D554B';ctx.lineWidth=Math.max(4,size/72);ctx.lineCap='round';ctx.lineJoin='round';}
  function move(e){e.preventDefault();if(!down)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last[0],last[1]);ctx.lineTo(p[0],p[1]);ctx.stroke();last=p;S.hasInk=true;}
  function end(e){e.preventDefault();if(!down)return;down=false;strokeCount++;count.textContent=strokeCount+' 笔';}
  ['mousedown','touchstart'].forEach(ev=>cv.addEventListener(ev,start,{passive:false}));
  ['mousemove','touchmove'].forEach(ev=>cv.addEventListener(ev,move,{passive:false}));
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>cv.addEventListener(ev,end,{passive:false}));
  box.appendChild(cv);
  const tools=el('div','canvas-tools');const clear=el('button','small','清除');const count=el('div','tool-text','0 笔');
  clear.onclick=()=>{grid();strokeCount=0;S.hasInk=false;count.textContent='0 笔';};
  tools.appendChild(clear);tools.appendChild(count);box.appendChild(tools);return box;
}
function snap(){const cv=document.querySelector('canvas');if(!cv)return '';const o=document.createElement('canvas');o.width=120;o.height=120;const c=o.getContext('2d');c.fillStyle='#FFF';c.fillRect(0,0,120,120);c.drawImage(cv,0,0,120,120);return o.toDataURL('image/jpeg',.7);}
function Practice(){
  const item=S.list[S.i];
  const wrap=el('div');
  const top=el('div','practice-top');
  const back=el('button','navbtn','← 返回');back.onclick=()=>{S.screen='home';S.phase='write';render();};
  const counter=el('div','counter',`${S.i+1} / ${S.list.length} · 对 ${S.session.ok} · 错 ${S.session.bad} · 金币 ${S.coins||0}`);
  const replay=el('button','navbtn','再听');replay.onclick=()=>speak(item);
  top.appendChild(back);top.appendChild(counter);top.appendChild(replay);wrap.appendChild(top);
  const bar=el('div','bar',`<div style="width:${((S.i)/S.list.length)*100}%"></div>`);wrap.appendChild(bar);

  if(S.phase==='write'){
    const card=el('div','card listen-card');
    card.innerHTML=`<div class="prompt-title">${safe(item.grade)} · ${safe(item.vol)} · ${safe(item.lesson)} · 第 ${item.charNo} 字</div><button class="listen-btn" id="listenNow">再听一遍</button><div class="note" style="margin-top:12px">听清楚字和两个词语，再在下面田字格里写。</div>`;
    wrap.appendChild(card);
    const ccard=el('div','card canvas-card');ccard.innerHTML='<div class="canvas-note">田字格写字区</div>';ccard.appendChild(makeCanvas());wrap.appendChild(ccard);
    const done=el('button','primary-btn','写好了，查看答案');done.onclick=()=>{if(!S.hasInk){alert('请先在田字格里写字。');return;}S.img=snap();S.phase='compare';render();};wrap.appendChild(done);
    setTimeout(()=>{const b=document.getElementById('listenNow');if(b)b.onclick=()=>speak(item);},0);
  } else if(S.phase==='compare'){
    const card=el('div','card');card.innerHTML=`<div class="breadcrumb">${safe(item.grade)} · ${safe(item.vol)} · ${safe(item.lesson)}</div><div class="section-title">🔍 对比答案</div>`;
    const grid=el('div','compare-grid');
    const left=el('div','box');left.innerHTML='<div class="box-label">你写的</div>'+(S.img?`<img src="${S.img}" style="width:120px;height:120px;object-fit:contain;border:1px solid var(--line);border-radius:14px;background:white;margin:0 auto">`:'<div class="note">没有截图</div>');
    const right=el('div','box',`<div class="box-label">标准字</div><div class="standard">${safe(item.c)}</div>`);
    grid.appendChild(left);grid.appendChild(right);card.appendChild(grid);
    const judges=el('div','judges');
    const ok=el('button','judge ok','写对了');const bad=el('button','judge bad','加入生字本');
    ok.onclick=()=>judge(true);bad.onclick=()=>judge(false);judges.appendChild(ok);judges.appendChild(bad);card.appendChild(judges);
    const again=el('button','secondary-btn','不算成绩，再写一次');again.onclick=()=>{S.phase='write';S.img=null;render();setTimeout(()=>speak(item),250);};card.appendChild(again);
    wrap.appendChild(card);
  } else if(S.phase==='finish'){
    const card=el('div','card');card.innerHTML=`<div class="finish-title">练习完成</div><div class="finish-sub">${safe(S.session.title)} · 共 ${S.session.total} 字</div>`;
    const stats=el('div','stats');[[S.session.ok,'写对'],[S.session.bad,'加入生字本'],[S.session.total,'总字数'],[S.session.wrongIds.length,'本次加入'],[S.session.earned||0,'本次金币']].forEach(([n,l])=>{stats.appendChild(el('div','stat',`<div class="stat-n">${n}</div><div class="stat-l">${l}</div>`));});card.appendChild(stats);
    const home=el('button','primary-btn','回到首页');home.style.marginTop='14px';home.onclick=()=>{S.screen='home';S.phase='write';render();};card.appendChild(home);
    if(S.session.wrongIds.length){const retry=el('button','secondary-btn','再练本次加入');retry.onclick=()=>{const ids=new Set(S.session.wrongIds);startPractice(S.list.filter(x=>ids.has(x.id)),'本次加入复练');};card.appendChild(retry);}
    wrap.appendChild(card);
  }
  return wrap;
}
function judge(ok){
  const item=S.list[S.i];S.done[item.id]=Date.now();
  S.coins=(S.coins||0)+1;
  if(S.session)S.session.earned=(S.session.earned||0)+1;
  if(ok){playSound('correct');S.session.ok++;delete S.wrong[item.id];}
  else{playSound('buy');S.session.bad++;S.wrong[item.id]=item;if(!S.session.wrongIds.includes(item.id))S.session.wrongIds.push(item.id);}
  const finished=S.i>=S.list.length-1;
  save();
  if(finished){S.phase='finish';setTimeout(()=>playSound('finish'),190);}
  else{S.i++;S.phase='write';S.img=null;S.hasInk=false;}
  render();if(S.phase==='write')setTimeout(()=>speak(S.list[S.i]),300);
}
function stickerById(id){return STICKERS.find(x=>x.id===id)||STICKERS[0];}
function ownedStickerCount(){return Object.values(S.stickers||{}).reduce((a,b)=>a+(Number(b)||0),0);}
function normalizeAlbum(){
  if(!Array.isArray(S.album))S.album=[];
  S.album=S.album.map((x,i)=>{
    if(typeof x==='string'){
      const col=i%6,row=Math.floor(i/6);
      return {id:x,x:12+col*16,y:14+row*16,s:1,r:0,page:0};
    }
    return {
      id:x.id,
      x:Number.isFinite(x.x)?x.x:50,
      y:Number.isFinite(x.y)?x.y:50,
      s:Number.isFinite(x.s)?x.s:1,
      r:Number.isFinite(x.r)?x.r:0,
      page:Number.isFinite(x.page)?Math.max(0,Math.min(2,x.page)):0
    };
  }).filter(x=>x.id);
}
function RewardCard(){
  const card=el('div','card');
  card.innerHTML=`<div class="reward-head"><div><div class="section-title" style="margin-bottom:3px">🎁 领取奖励</div><div class="note">每完成一个字，得到 1 个金币。金币可以用来买更多贴纸，再自由贴进 3 张贴纸书页面。</div></div><div class="coin-pill">🪙 ${S.coins||0}</div></div>`;
  const actions=el('div','reward-actions');
  const shop=el('button','reward-btn sage','🛍️ 购购买贴纸');
  shop.onclick=()=>{S.screen='shop';render();};
  const album=el('button','reward-btn blue',`📒 贴纸书 · ${S.album.length} 张`);
  album.onclick=()=>{S.screen='album';render();};
  actions.appendChild(shop);actions.appendChild(album);card.appendChild(actions);
  return card;
}
function Shop(){
  const wrap=el('div');
  const top=el('div','practice-top');
  const back=el('button','navbtn','← 返回');back.onclick=()=>{S.screen='home';render();};
  const title=el('div','counter',`🛍️ 购购买贴纸 · 金币 ${S.coins||0}`);
  const album=el('button','navbtn','📒 贴纸书');album.onclick=()=>{S.screen='album';render();};
  top.appendChild(back);top.appendChild(title);top.appendChild(album);wrap.appendChild(top);
  const info=el('div','card');
  info.innerHTML=`<div class="section-title">🛍️ 购买贴纸</div><div class="reward-copy">规则：每写完并判断一个字，获得 1 个金币。买到的贴纸会先进入库存，再到贴纸书里自由摆放。</div><div class="coin-pill">🪙 当前金币：${S.coins||0}</div>`;
  wrap.appendChild(info);
  const grid=el('div','shop-grid');
  STICKERS.forEach(st=>{
    const owned=S.stickers[st.id]||0;
    const card=el('div','sticker-card');
    card.innerHTML=`<div class="sticker-emoji">${st.emoji}</div><div class="sticker-name">${safe(st.name)}</div><div class="sticker-meta">价格 ${st.cost} 金币 · 库存 ${owned}</div>`;
    const btn=el('button','buy-btn',S.coins>=st.cost?'购买':'金币不足');
    btn.disabled=S.coins<st.cost;
    btn.onclick=()=>buySticker(st.id);
    card.appendChild(btn);grid.appendChild(card);
  });
  const gridCard=el('div','card');gridCard.appendChild(grid);wrap.appendChild(gridCard);
  return wrap;
}
function buySticker(id){
  const st=stickerById(id);
  if((S.coins||0)<st.cost){alert('金币不够。继续写字可以赚金币。');return;}
  S.coins-=st.cost;
  S.stickers[id]=(S.stickers[id]||0)+1;
  playSound('buy');
  save();render();
}

function Album(){
  normalizeAlbum();
  if(!Number.isFinite(S.albumPage))S.albumPage=0;
  S.albumPage=Math.max(0,Math.min(2,S.albumPage));
  const wrap=el('div','stickerbook-shell');

  const top=el('div','stickerbook-topbar');
  const back=el('button','stickerbook-back','← 返回');
  back.onclick=()=>{S.selectedSticker=null;S.activePlacedSticker=null;S.screen='home';render();};
  const shop=el('button','stickerbook-shop','购购买贴纸');
  shop.onclick=()=>{S.selectedSticker=null;S.activePlacedSticker=null;S.screen='shop';render();};
  const coin=el('div','stickerbook-coin',`🪙 ${S.coins||0} 金币`);
  top.appendChild(back); top.appendChild(shop); top.appendChild(coin);
  wrap.appendChild(top);

  const header=el('div','stickerbook-header');
  header.innerHTML=`<div class="stickerbook-title">📒 贴纸书</div><div class="stickerbook-subtitle">把你赚到的贴纸放到页面上吧！一共 3 页，不同颜色，不同心情。</div>`;
  wrap.appendChild(header);

  const pager=el('div','stickerbook-pager');
  const pageNames=['蓝色页','绿色页','黄色页'];
  pageNames.forEach((name,idx)=>{
    const btn=el('button','stickerbook-pagepill'+(S.albumPage===idx?' sel':''),`${name} · 第 ${idx+1}/3 页`);
    btn.onclick=()=>{S.albumPage=idx;S.activePlacedSticker=null;render();};
    pager.appendChild(btn);
  });
  wrap.appendChild(pager);

  const frame=el('div','stickerbook-frame');
  const board=el('div','album-board page-'+S.albumPage+(S.selectedSticker?' ready':''));
  board.id='albumBoard';
  const pageItems=S.album.map((it,idx)=>({...it,_idx:idx})).filter(it=>(it.page||0)===S.albumPage);
  const hint=el('div','album-hint',pageItems.length?'':'请先在下面选择一张贴纸，然后点页面空白处把它放上来。');
  board.appendChild(hint);

  pageItems.forEach((it)=>{
    const st=stickerById(it.id);
    const holder=el('div','placed-sticker-wrap'+(S.activePlacedSticker===it._idx?' active':''));
    holder.style.left=(it.x||50)+'%';
    holder.style.top=(it.y||50)+'%';
    holder.dataset.index=it._idx;
    const face=el('span','placed-sticker-face',st.emoji);
    holder.appendChild(face);
    if(S.activePlacedSticker===it._idx){
      const removeBtn=el('button','sticker-remove-btn','×');
      removeBtn.title='拿下这张贴纸';
      removeBtn.onclick=(e)=>{e.stopPropagation();removeStickerFromAlbum(it._idx);};
      holder.appendChild(removeBtn);
    }
    makeStickerDraggable(holder,it._idx);
    board.appendChild(holder);
  });

  board.onclick=(e)=>{
    if(e.target.classList.contains('placed-sticker-face')||e.target.classList.contains('sticker-remove-btn')) return;
    S.activePlacedSticker=null;
    if(!S.selectedSticker) { render(); return; }
    const r=board.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width)*100;
    const y=((e.clientY-r.top)/r.height)*100;
    placeStickerAt(S.selectedSticker,x,y,S.albumPage);
  };
  frame.appendChild(board);
  wrap.appendChild(frame);

  const help=el('div','stickerbook-help',S.selectedSticker
    ? `已选择贴纸：${stickerById(S.selectedSticker).emoji} ${safe(stickerById(S.selectedSticker).name)}。现在点上面的页面，把它放到你喜欢的位置。贴上去以后，还可以随便拖动；再点贴纸，会出现红色叉，点叉可以拿下来。`
    : '提示：贴纸在下面。先选一张贴纸，再点上面的页面放上去；贴上去后可以随意拖动。');
  wrap.appendChild(help);

  const storage=el('div','sticker-storage');
  storage.innerHTML=`<div class="sticker-storage-title">贴纸在这里</div><div class="sticker-storage-note">请先从这里选择贴纸，再把你的贴纸放到上面的页面上。点一下已贴贴纸，会出现红色叉；点红色叉，贴纸就会回到这里。</div>`;
  const owned=STICKERS.filter(st=>(S.stickers[st.id]||0)>0);
  if(!owned.length){
    const empty=el('div','empty-state','现在这里还没有贴纸。先去购购买贴纸购买，或者继续练习写字赚金币。');
    storage.appendChild(empty);
  }else{
    const grid=el('div','sticker-storage-grid');
    owned.forEach(st=>{
      const item=el('div','sticker-storage-item'+(S.selectedSticker===st.id?' sel':''));
      item.innerHTML=`<div class="sticker-storage-emoji">${st.emoji}</div><div class="sticker-storage-name">${safe(st.name)}</div><div class="sticker-storage-count">剩余 ${S.stickers[st.id]||0} 张</div>`;
      const btn=el('button','sticker-storage-btn'+(S.selectedSticker===st.id?' sel':''),S.selectedSticker===st.id?'已选中':'选择贴纸');
      btn.onclick=()=>{S.activePlacedSticker=null;S.selectedSticker=(S.selectedSticker===st.id?null:st.id);render();};
      item.appendChild(btn);
      grid.appendChild(item);
    });
    storage.appendChild(grid);
  }
  wrap.appendChild(storage);
  return wrap;
}
function placeStickerAt(id,x,y,page){
  if((S.stickers[id]||0)<=0)return;
  S.stickers[id]-=1;
  if(S.stickers[id]<=0){delete S.stickers[id];S.selectedSticker=null;}
  S.album.push({id,x:Math.max(4,Math.min(96,x)),y:Math.max(5,Math.min(95,y)),s:1,r:0,page:Math.max(0,Math.min(2,page||0))});
  S.activePlacedSticker=null;
  playSound('buy');
  save();render();
}
function placeSticker(id){
  placeStickerAt(id,50,50,S.albumPage||0);
}
function removeStickerFromAlbum(idx){
  const it=S.album[idx];
  if(!it)return;
  S.stickers[it.id]=(S.stickers[it.id]||0)+1;
  S.album.splice(idx,1);
  if(S.activePlacedSticker===idx)S.activePlacedSticker=null;
  playSound('buy');
  save();render();
}
function makeStickerDraggable(node,idx){
  let dragging=false,moved=false,startX=0,startY=0;
  function moveTo(clientX,clientY){
    const board=document.getElementById('albumBoard');
    if(!board||!S.album[idx])return;
    const r=board.getBoundingClientRect();
    const x=((clientX-r.left)/r.width)*100;
    const y=((clientY-r.top)/r.height)*100;
    S.album[idx].x=Math.max(4,Math.min(96,x));
    S.album[idx].y=Math.max(5,Math.min(95,y));
    node.style.left=S.album[idx].x+'%';
    node.style.top=S.album[idx].y+'%';
  }
  function down(e){
    if(e.target.classList.contains('sticker-remove-btn')) return;
    e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    startX=t.clientX; startY=t.clientY; moved=false; dragging=true;
  }
  function move(e){
    if(!dragging)return;
    e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    if(Math.abs(t.clientX-startX)>4||Math.abs(t.clientY-startY)>4)moved=true;
    moveTo(t.clientX,t.clientY);
  }
  function up(e){
    if(!dragging)return;
    dragging=false;
    if(!moved){
      S.activePlacedSticker=(S.activePlacedSticker===idx?null:idx);
      render();
      return;
    }
    save();
  }
  node.addEventListener('mousedown',down,{passive:false});
  node.addEventListener('touchstart',down,{passive:false});
  window.addEventListener('mousemove',move,{passive:false});
  window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',up);
  window.addEventListener('touchend',up);
}
function render(){
  app.innerHTML='';
  if(S.screen==='practice')app.appendChild(Practice());
  else if(S.screen==='shop')app.appendChild(Shop());
  else if(S.screen==='album')app.appendChild(Album());
  else app.appendChild(Home());
}
render();
</script>
